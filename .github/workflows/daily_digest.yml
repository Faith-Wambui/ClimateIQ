name: Daily Climate Digest

on:
  schedule:
    - cron: '0 5 * * *'  # 5AM UTC = 8AM EAT daily
  workflow_dispatch:       # allows manual trigger from GitHub

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test API key exists
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c "
          import os
          key = os.environ.get('GEMINI_API_KEY', 'NOT FOUND')
          print('Key found:', key != 'NOT FOUND')
          print('Key length:', len(key))
          print('Key preview:', key[:8] if len(key) > 8 else 'TOO SHORT')
          "

      - name: Run digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: python -m scheduler.runner --now

      - name: Update README from sources
        run: python scripts/update_readme.py

      - name: Commit README if changed
        run: |
            git config --global user.name "github-actions"
            git config --global user.email "actions@github.com"
            git add README.md
            git diff --staged --quiet || git commit -m "auto-update README sources"
            git push

      - name: Commit and push outputs
        run: |
          git config user.name "ClimateIQ Bot"
          git config user.email "bot@climateiq.actions"
          git pull origin main --rebase  
          git add output/ climate_history.db
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "📧 Daily digest: $(date +'%Y-%m-%d')" && git push)