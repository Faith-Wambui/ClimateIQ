name: Daily Climate Digest

on:
  schedule:
    - cron: '0 5 * * *'  # 5AM UTC = 8AM EAT daily
  workflow_dispatch:

jobs:
  run-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for pushing commits
    
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 587
          
        run: python -m scheduler.runner --now
      - name: Update README
        run: python scripts/update_readme.py || echo "README script not found"
        continue-on-error: true

      - name: Commit and push all outputs
        run: |
          git config user.name "ClimateIQ Bot"
          git config user.email "bot@climateiq.actions"
          git add output/ climate_history.db README.md
          git commit -m "📧 Daily digest: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push origin main || git push --force-with-lease origin main